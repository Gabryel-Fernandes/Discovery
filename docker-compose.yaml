services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_IA_URL=http://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      ia:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      - IA_API_URL=http://ia:8001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ia:
    build:
      context: ./IA
      dockerfile: Dockerfile
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    env_file:
      - ./IA/.env
    environment:
      - API_PORT=8001
      - PYTHONPATH=/app
    volumes:
      - ./IA:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  scraping:
    build:
      context: ./scraping
      dockerfile: Dockerfile
    env_file:
      - ./scraping/.env
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./scraping:/app

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: